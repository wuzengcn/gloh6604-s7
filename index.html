# Why conduct sensativity analysis

---
#Uncertainty

- Methodological uncertainty (i.e discount rate)

- Research subjects' characteristics (i.e. incidence of malaria)

- Parameters that could be sampled (i.e. probabilities, costs, effectiveness)

---
# Methodological uncertainty
- Economic evaluation consists of a range of techniques: measurement and valuation

- There exist disagreement among practitioners about most appropriate analytical methods

  - Discounting of costs and benefits
	
	- Value resources and health outcomes (financial costs vs. Economic costs; Boundary of health outcomes)
	
---
# Research subjects and importance of the margin

- Population characteristics and risk population (Margins)

- Intervention intensity

&lt;center width = "50%"&gt;

&lt;image src="libs/pic/S6-Fig1.png" width="70%"&gt;

---
#Parameters that could be sampled
	
- Probabilities
		
- Resource use consequences and health outcome consequences
		
- Data necessary to value those consequences
		
- The clinical trial provides opportunities to describe distributions of data for uncertainty analysis: (Second-order uncertainty; first-order uncertainty)

- One way sensitivity analysis

- Scenario analysis

	- Probabilistic (PSA): model inputs are specified as a distribution and varied

- Second order Monte Carlo simulation

# How to model uncertainty

---
#General approch: Sensitivity analysis
	
- Change model input

- Recalculate ICER

- if new ICER is substantially different from old ICER, then model is sensitive to that parameter

- It is important to be accurate about this parameter

#One way sensativity analysis: Definition

- Vary one input(parameter) at a time, and see how model resutls are affected

- Base case: 0.01

- Senativity analysis: Range from 0.005-0.015
	
	- Run 6 models, each with folliwing input: 0.005, 0.007, 0.009, 0.011, 0.013, 0.015

#First order Mento Carlo simulation: Definition
	
- Cohort simulation: Hypothetical cohort of participants transit through the model simultaneiously 
		
- Monte Carlos simulation (.red[first order]): .red[Randomly selected participants] transit throught the model individually

- The first-order Mento Carlo simulation randomly selects a participant from the hypothetical cohort, who is followed through the model individually. 

- Individual participant can only be in one state at a given time they may or may not transit between states in any given cycle. The path follwed by different participants will differ due to chance.

# Second order Mento Carlo simulation: Definition
	
- Vary multiple .red[parameters] simultaneously
		
- Each variable comes from a .red[distribution]
		
- Model runs many times (1,000, 10,000, etc.)

- Each model iteration plucks a value from that distribution and uses it as the model input
		
	- Values are sampled with .red[replacement]
		
	- Values sampled based on their likelihood of occurrence
	
---

#Chossing distribution for second order Mento Carlo simulation
	
- Costs: log-normal, normal, gammar
		
- Probabilities: beta
		
- Utilities: beta
	
---

#Creating distribution-based definitions
	
- Create the distribution: Discdeath

- Define the distribution in terms of its shape
	
	- Normal, beta, etc
	
- Define the parameters for that distribution
	
	- Mean/variance, alpha/beta, etc
	
		- Assign the distribution to a variable

- Cdeath = Discdeath
